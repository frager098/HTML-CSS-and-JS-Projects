<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
        integrity="sha512-XcIsjKMcuVe0Ucj/xgIXQnytNwBttJbNjltBV18IOnru2lDPe9KRRyvCXw6Y5H415vbBLRm8+q6fmLUU7DfO6Q=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body id="dark-theme">
    <div class="main">
        <div class="global">

            <p>Coins: <b id="coins-count">14690</b></p>
            <p>Exchanges: <b id="exchanges-count">1186</b></p>
            <p>Market Cap: <span><b id="marketCap">$2.0837T</b></span>
                <span><span id="marketCapChange">-4.9% <i class="ri-arrow-drop-down-line"></i></span></span>
            </p>
            <p>24H Vol: <b id="volume">77.863B</b></p>
            <p>Dominance: <b id="dominance">BTC 53.8% - ETH 15.6%</b></span></p>
        </div>

        <nav>
            <div class="left-section">
                <a href="#" class="logo">Logo.</a>
                <div class="nav-links">
                    <a href="/index.html">Home</a>
                    <a href="/pages/charts.html" class="active">Charts</a>
                    <a href="/pages/search.html">Search</a>
                    <a href="/pages/about.html">About Us</a>
                </div>
            </div>

            <div class="right-section">
                <form class="search" id="searchForm">
                    <i class="ri-search-line"></i>
                    <input type="text" id="" placeholder="Search for an asset..." required autocomplete="off">
                </form>
                <i id="theme-toggle" class="ri-sun-line"></i>
            </div>
        </nav>

        <div class="chart-container">
            <div class="tradingview-widget-container" id="chart-widget"></div>
            <div class="tradingview-widget-copyright hidden">
                <a href="https://www.tradingview.com/" rel="noopener nofollow" target="_blank"><span
                        class="white-text">Track all markets on
                        TradingView</span></a>
            </div>
        </div>

        <footer>
            <p>Made by Muhammad Arham</p>
            <div class="social-icons">
                <a href="https://github.com/frager098" target="_blank">
                    <i class="ri-github-fill"></i>
                </a>
                <a href="https://www.linkedin.com/in/arham-khalid-390087376/" target="_blank">
                    <i class="ri-linkedin-box-fill"></i>
                </a>
            </div>
        </footer>

        <button id="scrollTop"><i class="ri-arrow-up-s-line"></i></button>

    </div>
</body>

</html>
